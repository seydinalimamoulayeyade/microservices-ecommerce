apiVersion: v1
kind: Service
metadata:
  name: mongo-payments
  namespace: databases
spec:
  clusterIP: None
  selector:
    app: mongo-payments
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-payments
  namespace: databases
spec:
  serviceName: mongo-payments
  replicas: 1
  selector:
    matchLabels:
      app: mongo-payments
  template:
    metadata:
      labels:
        app: mongo-payments
    spec:
      containers:
        - name: mongo
          image: mongo:7.0
          ports:
            - containerPort: 27017
          volumeMounts:
            - name: data
              mountPath: /data/db
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
