# Configuration SonarQube pour le monorepo microservices e-commerce
# Utilisée par le stage « Sonar » du Jenkinsfile (sonar-scanner)

sonar.projectKey=microservices-ecommerce
sonar.projectName=Microservices E-commerce
sonar.projectVersion=1.0

# Sources : le code des 5 services
sonar.sources=services

# Exclusions : dépendances, couverture, fichiers de tests
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js

# Tests et couverture (rapports lcov si générés)
sonar.test.inclusions=**/*.test.js
sonar.javascript.lcov.reportPaths=services/*/coverage/lcov.info

sonar.sourceEncoding=UTF-8
